<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Final Chess Game</title>
<style>
body{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;background:#222;color:#fff;font-family:Arial}
#chessboard{display:grid;grid-template-columns:repeat(8,70px);grid-template-rows:repeat(8,70px);border:4px solid #111}
.square{display:flex;align-items:center;justify-content:center;font-size:34px;cursor:pointer}
.white{background:#f0d9b5}
.black{background:#b58863}
.selected{box-shadow:inset 0 0 0 4px yellow}
.valid{background:rgba(0,255,0,0.4)!important}
.check{background:rgba(255,0,0,0.6)!important}
</style>
</head>
<body>
<h2>Chess Game (Final Version)</h2>
<button id="restartBtn">Restart Game</button>
<div id="chessboard"></div>

<script>
const chessboard=document.getElementById('chessboard');

const pieces={p:'♟',r:'♜',n:'♞',b:'♝',q:'♛',k:'♚',P:'♙',R:'♖',N:'♘',B:'♗',Q:'♕',K:'♔'};

let board,turn,selected,validMoves,gameOver;

function init(){
 board=[
 ['r','n','b','q','k','b','n','r'],
 ['p','p','p','p','p','p','p','p'],
 ['','','','','','','',''],
 ['','','','','','','',''],
 ['','','','','','','',''],
 ['','','','','','','',''],
 ['P','P','P','P','P','P','P','P'],
 ['R','N','B','Q','K','B','N','R']];

 turn='white';
 selected=null;
 validMoves=[];
 gameOver=false;
 render();
}

function render(){
 chessboard.innerHTML='';
 let king=findKing(turn);
 for(let r=0;r<8;r++){
  for(let c=0;c<8;c++){
   let sq=document.createElement('div');
   sq.className='square '+((r+c)%2?'black':'white');

   if(selected && selected.r===r && selected.c===c) sq.classList.add('selected');
   if(validMoves.some(m=>m[0]===r&&m[1]===c)) sq.classList.add('valid');
   if(king && r===king[0]&&c===king[1]&&inCheck(turn)) sq.classList.add('check');

   if(board[r][c]){
     let p=document.createElement('span');
     p.textContent=pieces[board[r][c]];
     p.style.color=(board[r][c]===board[r][c].toUpperCase())?'white':'black';
     sq.appendChild(p);
   }

   sq.onclick=()=>click(r,c);
   chessboard.appendChild(sq);
  }
 }
}

function click(r,c){
 if(gameOver) return;

 if(selected){
  if(validMoves.some(m=>m[0]===r&&m[1]===c)){
   move(selected.r,selected.c,r,c);

   if(inCheck(turn) && !isCheckmate(turn)){
     alert(turn.toUpperCase()+" IN CHECK");
   }

   if(isCheckmate(turn)){
     gameOver=true;
     alert(opponent()+" wins by CHECKMATE! GAME OVER");
   }

   if(!inCheck(turn) && isStalemate(turn)){
     gameOver=true;
     alert("STALEMATE! GAME OVER");
   }
  }
  selected=null; validMoves=[];
 }
 else if(board[r][c] && isTurn(r,c)){
  selected={r,c};
  validMoves=getLegalMoves(r,c);
 }

 render();
}

function move(fr,fc,tr,tc){
 let p=board[fr][fc];
 board[tr][tc]=p;
 board[fr][fc]='';

 if(p==='P'&&tr===0) board[tr][tc]='Q';
 if(p==='p'&&tr===7) board[tr][tc]='q';

 turn=opponent();
}

function opponent(){return turn==='white'?'black':'white'}

function isTurn(r,c){
 let p=board[r][c];
 return turn==='white'?p===p.toUpperCase():p===p.toLowerCase();
}

function getMoves(r,c){
 let p=board[r][c],moves=[];
 let dirs={rook:[[1,0],[-1,0],[0,1],[0,-1]],bishop:[[1,1],[1,-1],[-1,1],[-1,-1]]};

 function line(d){for(let[dr,dc]of d){let nr=r+dr,nc=c+dc;while(inB(nr,nc)){if(!board[nr][nc])moves.push([nr,nc]);else{if(!same(r,c,nr,nc))moves.push([nr,nc]);break;}nr+=dr;nc+=dc;}}}

 if(p.toLowerCase()==='p'){
  let dir=p==='P'?-1:1,start=p==='P'?6:1;
  if(inB(r+dir,c)&&!board[r+dir][c]){
   moves.push([r+dir,c]);
   if(r===start&&!board[r+2*dir][c])moves.push([r+2*dir,c]);
  }
  for(let dc of [-1,1]){
   let nr=r+dir,nc=c+dc;
   if(inB(nr,nc)&&board[nr][nc]&&!same(r,c,nr,nc))moves.push([nr,nc]);
  }
 }
 else if(p.toLowerCase()==='r') line(dirs.rook);
 else if(p.toLowerCase()==='b') line(dirs.bishop);
 else if(p.toLowerCase()==='q') line([...dirs.rook,...dirs.bishop]);
 else if(p.toLowerCase()==='n'){
  let k=[[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]];
  for(let[dr,dc]of k){let nr=r+dr,nc=c+dc;if(inB(nr,nc)&&!same(r,c,nr,nc))moves.push([nr,nc]);}
 }
 else if(p.toLowerCase()==='k'){
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
   if(dr||dc){let nr=r+dr,nc=c+dc;if(inB(nr,nc)&&!same(r,c,nr,nc))moves.push([nr,nc]);}
  }
 }
 return moves;
}

function getLegalMoves(r,c){
 let piece=board[r][c];
 let color = piece===piece.toUpperCase()?'white':'black';
 let moves=getMoves(r,c),legal=[];

 for(let m of moves){
  let backup=JSON.parse(JSON.stringify(board));
  board[m[0]][m[1]]=piece;
  board[r][c]='';

  if(!inCheck(color)) legal.push(m);

  board=backup;
 }
 return legal;
}

function inCheck(color){
 let king=findKing(color);
 for(let r=0;r<8;r++){
  for(let c=0;c<8;c++){
   if(board[r][c] && (color==='white'?board[r][c]===board[r][c].toLowerCase():board[r][c]===board[r][c].toUpperCase())){
    if(getMoves(r,c).some(m=>m[0]===king[0]&&m[1]===king[1])) return true;
   }
  }
 }
 return false;
}

function isCheckmate(color){
 if(!inCheck(color)) return false;
 for(let r=0;r<8;r++){
  for(let c=0;c<8;c++){
   if(board[r][c] && ((color==='white')==(board[r][c]===board[r][c].toUpperCase()))){
    if(getLegalMoves(r,c).length>0) return false;
   }
  }
 }
 return true;
}

function isStalemate(color){
 if(inCheck(color)) return false;
 for(let r=0;r<8;r++){
  for(let c=0;c<8;c++){
   if(board[r][c] && ((color==='white')==(board[r][c]===board[r][c].toUpperCase()))){
    if(getLegalMoves(r,c).length>0) return false;
   }
  }
 }
 return true;
}

function findKing(color){
 for(let r=0;r<8;r++)for(let c=0;c<8;c++){
  if(board[r][c]===(color==='white'?'K':'k')) return [r,c];
 }
}

function same(r1,c1,r2,c2){
 let a=board[r1][c1], b=board[r2][c2];
 if(!a || !b) return false;
 return (a===a.toUpperCase()&&b===b.toUpperCase())||(a===a.toLowerCase()&&b===b.toLowerCase());
}

function inB(r,c){return r>=0&&c>=0&&r<8&&c<8}

document.getElementById('restartBtn').addEventListener('click', init);
init();
</script>
</body>
</html>
